name: Votify CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Build and install all modules
        run: mvn clean install -DskipTests

      - name: Run tests with Maven and Jacoco
        run: mvn clean test -pl votify-test jacoco:report

      - name: Generate JaCoCo badge
        uses: cicirello/jacoco-badge-generator@v2.11.0
        with:
          jacoco-csv-file: votify-test/target/site/jacoco/jacoco.csv
          badges-folder: badges
          generate-branches-badge: true

      - name: Upload badges as artifact
        uses: actions/upload-artifact@v4
        with:
          name: badges
          path: badges/