name: Votify Java CI

on:
  push:
    branches:
      - main
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - '**/*.properties'
      - '**/*.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run tests
        uses: ./.github/actions/test
        with:
          fetch-depth: '0'
          maven-goal: 'verify'
          upload-artifacts: 'true'

  generate-badges:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Generate JaCoCo badges
        uses: ./.github/actions/generate-badges
        with:
          jacoco-csv-file: votify-test/target/site/jacoco-aggregate/jacoco.csv
          generate-branches-badge: true
          coverage-badge-filename: jacoco.svg
          branches-badge-filename: branches.svg
